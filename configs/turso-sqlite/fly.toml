app = 'my-maho-app'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  SERVER_NAME = ':80'
  PHP_INI_SCAN_DIR = '/usr/local/etc/php/conf.d:/data'
  TURSO_SYNC_URL = 'libsql://my-maho-app-mageaustralia.aws-ap-northeast-1.turso.io'
  TURSO_SYNC_INTERVAL = '5'
  TURSO_READ_YOUR_WRITES = 'true'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "tcp"
    port = 80
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[mounts]
  source = "maho_data"
  destination = "/data"
