app = 'my-maho-app'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  SERVER_NAME = ':80'
  PHP_INI_SCAN_DIR = '/usr/local/etc/php/conf.d:/data'
  NEON_HOST = 'ep-your-endpoint.region.aws.neon.tech'
  NEON_DBNAME = 'neondb'
  NEON_USER = 'neondb_owner'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "tcp"
    port = 80
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[mounts]
  source = "maho_data"
  destination = "/data"
