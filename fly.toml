app = 'my-maho-app'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  SERVER_NAME = ':80'
  # Set these to your Neon project details
  PG_HOST = 'ep-your-endpoint.region.aws.neon.tech'
  PG_USER = 'neondb_owner'
  PG_DBNAME = 'neondb'
  PG_SSLMODE = 'require'

# Set PG_PASS as a secret: fly secrets set PG_PASS=your-password

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  concurrency_type = "connections"
  soft_limit = 50
  hard_limit = 100

[checks]
  [checks.health]
    type = "tcp"
    port = 80
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
